name: Build & Deploy Antora to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1) Checkout repo
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3) Install Antora
      - name: Install Antora
        run: npm install -D @antora/cli @antora/site-generator-default

      # 4) Build Antora site (output.dir = public u tvom playbooku)
      - name: Build Antora site
        run: npx antora antora-playbook.yml

      # 5) Setup GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # 6) Upload artifact (public/)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
